services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: acmeparts
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d acmeparts"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://acme:acme@db:5432/acmeparts
      SEED: "42"
      MESSINESS: "medium"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m app.seed.run && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:

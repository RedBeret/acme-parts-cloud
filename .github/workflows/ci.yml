name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Unit tests (no DB required)
        run: pytest tests/test_seed.py -v

  docker-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up --build -d

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/admin/healthz && break
            echo "Waiting... ($i)"
            sleep 3
          done

      - name: Run smoke tests
        env:
          SMOKE_API_URL: http://localhost:8000
        run: pip install -r requirements.txt && pytest tests/test_api_smoke.py -v

      - name: Stop services
        if: always()
        run: docker compose down

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AcmeParts Cloud{% endblock %} — Meridian Fabrication Co.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px;
           background: #f5f5f5; color: #1a1a1a; }
    nav { background: #1e293b; color: #e2e8f0; padding: 0 24px;
          display: flex; align-items: center; gap: 32px; height: 48px; }
    nav a { color: #cbd5e1; text-decoration: none; font-size: 13px; }
    nav a:hover { color: #fff; }
    nav .brand { font-weight: 700; font-size: 15px; color: #fff; }
    nav .synthetic-badge { background: #dc2626; color: #fff; font-size: 10px;
      padding: 2px 6px; border-radius: 3px; font-weight: 700; }
    main { max-width: 1200px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: #0f172a; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
             padding: 20px; margin-bottom: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .stat { text-align: center; }
    .stat .value { font-size: 32px; font-weight: 700; color: #0f172a; }
    .stat .label { font-size: 12px; color: #64748b; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8fafc; border-bottom: 2px solid #e2e8f0; padding: 8px 12px;
         text-align: left; font-weight: 600; color: #475569; font-size: 12px; }
    td { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; }
    tr:hover td { background: #f8fafc; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px;
              font-size: 11px; font-weight: 600; }
    .badge-green { background: #dcfce7; color: #15803d; }
    .badge-red { background: #fee2e2; color: #b91c1c; }
    .badge-gray { background: #f1f5f9; color: #64748b; }
    .badge-yellow { background: #fef9c3; color: #a16207; }
    input[type=text], select {
      border: 1px solid #cbd5e1; border-radius: 6px; padding: 6px 10px;
      font-size: 13px; outline: none; }
    input:focus, select:focus { border-color: #3b82f6; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .synthetic-notice { background: #fef3c7; border: 1px solid #fcd34d;
      border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #92400e;
      margin-bottom: 16px; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">AcmeParts Cloud</span>
    <a href="/">Dashboard</a>
    <a href="/parts">Parts</a>
    <a href="/suppliers">Suppliers</a>
    <a href="/change-orders">Change Orders</a>
    <a href="/docs">API Docs</a>
    <span class="synthetic-badge">SYNTHETIC DATA</span>
  </nav>
  <main>
    <div class="synthetic-notice">
      All data is synthetic. Meridian Fabrication Co. is a fictional company.
      This is a demo/integration sandbox, not a real enterprise system.
    </div>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
